<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 450" role="img" aria-label="Drools Credentialing Rules Engine">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#101114"/>
      <stop offset="1" stop-color="#0a0a0b"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="0%" r="70%">
      <stop offset="0" stop-color="#3d6bf5" stop-opacity="0.30"/>
      <stop offset="0.7" stop-color="#3d6bf5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="dotfade" cx="50%" cy="0%" r="78%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="0.7" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#ffffff" fill-opacity="0.09"/>
    </pattern>
    <mask id="dotmask"><rect width="1200" height="450" fill="url(#dotfade)"/></mask>
    <pattern id="cells" width="34" height="34" patternUnits="userSpaceOnUse">
      <rect x="3" y="3" width="28" height="28" rx="6" fill="#12182a" stroke="#33405f" stroke-width="1.1"/>
    </pattern>
  </defs>

  <rect width="1200" height="450" fill="url(#bg)"/>
  <rect width="1200" height="450" fill="url(#dots)" mask="url(#dotmask)"/>
  <rect width="1200" height="450" fill="url(#glow)"/>

  <!-- two tenant rule blocks on a shared engine -->
  <rect x="650" y="92" width="204" height="170" fill="url(#cells)"/>
  <rect x="888" y="92" width="170" height="170" fill="url(#cells)"/>

  <!-- highlighted "flag" rules -->
  <g fill="#1e2d52" stroke="#7aa2ff" stroke-width="1.5">
    <rect x="687" y="95" width="28" height="28" rx="6"/>
    <rect x="755" y="163" width="28" height="28" rx="6"/>
    <rect x="789" y="231" width="28" height="28" rx="6"/>
    <rect x="925" y="129" width="28" height="28" rx="6"/>
    <rect x="993" y="197" width="28" height="28" rx="6"/>
  </g>
  <g stroke="#9db6f7" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="694,109 700,115 709,102"/>
    <polyline points="762,177 768,183 777,170"/>
    <polyline points="796,245 802,251 811,238"/>
    <polyline points="932,143 938,149 947,136"/>
    <polyline points="1000,211 1006,217 1015,204"/>
  </g>

  <text x="70" y="360" fill="#7aa2ff" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="15" letter-spacing="3">BACKEND · RULES ENGINE</text>
  <text x="68" y="402" fill="#e9ecf4" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="32" font-weight="600">Drools Credentialing Engine</text>
</svg>
